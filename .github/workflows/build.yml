name: Build Grey Browser

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate project structure
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          PKG=app/src/main/java/com/grey/browser
          mkdir -p $PKG
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          cp Browser.kt $PKG/

          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "Grey"
          include(":app")
          EOF

          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")             version "8.9.1" apply false
              id("org.jetbrains.kotlin.android")        version "2.2.0" apply false
              id("org.jetbrains.kotlin.plugin.compose") version "2.2.0" apply false
          }
          EOF

          cat > app/build.gradle.kts << EOF
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
              id("org.jetbrains.kotlin.plugin.compose")
          }

          android {
              namespace  = "com.grey.browser"
              compileSdk = 36

              defaultConfig {
                  applicationId = "com.grey.browser"
                  minSdk        = 26
                  targetSdk     = 36
                  versionCode   = ${BUILD_NUMBER}
                  versionName   = "${BUILD_NUMBER}"
              }

              buildTypes {
                  release { isMinifyEnabled = false; isShrinkResources = false }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = "17" }
              buildFeatures { compose = true }

              splits {
                  abi {
                      isEnable       = true
                      reset()
                      include("arm64-v8a")
                      isUniversalApk = false
                  }
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.15.0")
              implementation("androidx.activity:activity-compose:1.10.1")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.9.0")

              val bom = platform("androidx.compose:compose-bom:2025.05.00")
              implementation(bom)
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-graphics")
              implementation("androidx.compose.foundation:foundation")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.compose.material:material-icons-extended")
              implementation("androidx.compose.animation:animation")
          }
          EOF

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
          kotlin.code.style=official
          android.suppressUnsupportedCompileSdk=36
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:allowBackup="false"
                  android:label="@string/app_name"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:theme="@style/AppTheme"
                  android:hardwareAccelerated="true"
                  android:largeHeap="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter>
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="http" />
                          <data android:scheme="https" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources><string name="app_name">Grey</string></resources>
          EOF

          cat > app/src/main/res/values/themes.xml << 'EOF'
          <resources>
              <style name="AppTheme" parent="android:Theme.Material.Light.NoActionBar">
                  <item name="android:windowBackground">#121212</item>
                  <item name="android:statusBarColor">#121212</item>
                  <item name="android:navigationBarColor">#121212</item>
                  <item name="android:windowLightStatusBar">false</item>
              </style>
          </resources>
          EOF

      - name: Generate launcher icons
        run: |
          pip install Pillow --quiet
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw
          import os

          def make_icon(size):
              img = Image.new('RGBA', (size, size), (18, 18, 18, 255))
              d = ImageDraw.Draw(img)
              m  = size // 6
              sw = max(3, size // 20)
              cx = size // 2
              mid_y = size // 2 + size // 12
              sb = size - m
              d.rounded_rectangle([m, m, size - m, mid_y], radius=size // 8,
                                  outline=(255, 255, 255, 255), width=sw)
              d.polygon([(m, mid_y), (cx, sb), (size - m, mid_y)],
                        fill=(255, 255, 255, 255))
              return img

          for density, s in {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96,
                              'xxhdpi': 144, 'xxxhdpi': 192}.items():
              path = f'app/src/main/res/mipmap-{density}'
              os.makedirs(path, exist_ok=True)
              icon = make_icon(s)
              icon.save(f'{path}/ic_launcher.png')
              icon.save(f'{path}/ic_launcher_round.png')

          print("Icons done.")
          PYEOF

      - name: Create Gradle Wrapper
        run: |
          sudo apt-get update -q && sudo apt-get install -y gradle
          gradle wrapper --gradle-version=8.11.1 --distribution-type=bin
          chmod +x gradlew

      - name: Set Android SDK path
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Bundle release
        run: |
          mkdir -p Grey-release/.github/workflows
          cp app/build/outputs/apk/debug/app-arm64-v8a-debug.apk Grey-release/Grey.apk
          cp Browser.kt Grey-release/
          cp .github/workflows/build.yml Grey-release/.github/workflows/ 2>/dev/null || true
          echo "Build:      #${{ github.run_number }}"            > Grey-release/BUILD_INFO.txt
          echo "Commit:     ${{ github.sha }}"                   >> Grey-release/BUILD_INFO.txt
          echo "Timestamp:  $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> Grey-release/BUILD_INFO.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Grey-${{ github.run_number }}
          path: Grey-release/
          retention-days: 30
